<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company HR Chatbot</title>
  <style>
    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --border:    #2e3347;
      --text:      #e2e8f0;
      --muted:     #8892a4;
      --accent:    #6366f1;
      --accent-h:  #818cf8;
      --human-bg:  #1e3a5f;
      --human-bar: #3b82f6;
      --ai-bg:     #1a3a2a;
      --ai-bar:    #10b981;
      --danger:    #ef4444;
      --c-thought: #76e4f7;
      --c-action:  #f6c90e;
      --c-obs:     #68d391;
      --c-finish:  #81e6d9;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 0.9rem 2rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.2rem; font-weight: 600; }
    .badge {
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--surface2);
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
    }

    .provider-select-wrap {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .provider-label {
      font-size: 0.75rem;
      color: var(--muted);
    }
    #provider-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-size: 0.8rem;
      padding: 0.25rem 0.55rem;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }
    #provider-select:hover  { border-color: var(--accent); }
    #provider-select:focus  { border-color: var(--accent); }

    main {
      flex: 1;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
    }
    .card-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    /* ── Input ── */
    textarea#question {
      width: 100%;
      min-height: 88px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      padding: 0.7rem 0.85rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.18s;
    }
    textarea#question:focus { border-color: var(--accent); }

    .btn-row {
      display: flex;
      gap: 0.65rem;
      margin-top: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      padding: 0.5rem 1.2rem;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s, color 0.15s;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    #ask-btn { background: var(--accent); color: #fff; }
    #ask-btn:hover:not(:disabled) { background: var(--accent-h); }

    #delete-btn {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
    }
    #delete-btn:hover:not(:disabled) { background: var(--danger); color: #fff; }

    #status {
      margin-left: auto;
      font-size: 0.78rem;
      color: var(--muted);
      min-height: 1rem;
    }

    /* ── Answer ── */
    #answer-text {
      font-size: 1rem;
      line-height: 1.65;
      white-space: pre-wrap;
      min-height: 1.8rem;
    }
    #answer-text.empty { color: var(--muted); font-style: italic; }

    /* ── Bottom grid ── */
    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }
    @media (max-width: 860px) { .bottom-grid { grid-template-columns: 1fr; } }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      max-height: 520px;
    }
    .panel-header {
      padding: 0.65rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      display: none;
      animation: pulse 1s ease-in-out infinite;
    }
    .live-dot.active { display: inline-block; }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }
    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem 1rem;
    }

    /* ── Thought entries ── */
    #thoughts {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .te {
      border-radius: 5px;
      padding: 0.45rem 0.65rem;
      font-size: 0.78rem;
      line-height: 1.55;
    }

    .te-header {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      margin-bottom: 0.3rem;
    }

    .te-label {
      font-size: 0.64rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
    }

    .te-tool {
      font-weight: 600;
      font-size: 0.8rem;
    }

    .te-content {
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      white-space: pre-wrap;
      word-break: break-word;
      color: #d1d5db;
      margin-top: 0.2rem;
      max-height: 160px;
      overflow-y: auto;
    }

    /* Thought = streamed LLM tokens */
    .te.thought {
      background: #0c2a35;
      border-left: 2px solid var(--c-thought);
    }
    .te.thought .te-label  { background: #134e61; color: var(--c-thought); }
    .te.thought .te-content { color: var(--c-thought); }

    /* Action = tool call */
    .te.action {
      background: #1f1500;
      border-left: 2px solid var(--c-action);
    }
    .te.action .te-label { background: #3d2800; color: var(--c-action); }
    .te.action .te-tool  { color: var(--c-action); }

    /* Observation = tool result */
    .te.observation {
      background: #071a0f;
      border-left: 2px solid var(--c-obs);
    }
    .te.observation .te-label { background: #0e3320; color: var(--c-obs); }

    /* Error observation */
    .te.obs-error {
      background: #1a0a0a;
      border-left: 2px solid #ef4444;
    }
    .te.obs-error .te-label { background: #3b1111; color: #fc8181; }

    /* ── Memory ── */
    #memory {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .msg {
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      font-size: 0.875rem;
      line-height: 1.5;
      max-width: 94%;
      word-break: break-word;
    }
    .msg.human { background: var(--human-bg); border-left: 3px solid var(--human-bar); align-self: flex-start; }
    .msg.ai    { background: var(--ai-bg);    border-left: 3px solid var(--ai-bar);    align-self: flex-end; }
    .msg .role {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }

    .empty-state { color: var(--muted); font-style: italic; font-size: 0.875rem; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 11px; height: 11px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.55s linear infinite;
      margin-right: 0.35rem;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <h1>Company HR Chatbot</h1>
    <span class="badge">LangChain · GPT-4o · SQL + PDF</span>
    <div class="provider-select-wrap">
      <span class="provider-label">LLM Provider:</span>
      <select id="provider-select">
        <option value="openai">OpenAI</option>
        <option value="azure">Azure OpenAI</option>
      </select>
    </div>
  </header>

  <main>
    <!-- Question -->
    <div class="card">
      <div class="card-title">Question</div>
      <textarea id="question"
        placeholder="Ask about workers, departments, salaries, hierarchy… (Ctrl+Enter to submit)"
        autofocus></textarea>
      <div class="btn-row">
        <button id="ask-btn">Ask</button>
        <button id="delete-btn">Delete Embeddings</button>
        <span id="status"></span>
      </div>
    </div>

    <!-- Answer -->
    <div class="card">
      <div class="card-title">Answer</div>
      <div id="answer-text" class="empty">Answer will appear here.</div>
    </div>

    <!-- Thought process + Memory -->
    <div class="bottom-grid">
      <div class="panel">
        <div class="panel-header">
          <span class="live-dot" id="live-dot"></span>
          Thought Process
        </div>
        <div class="panel-body" id="thoughts-body">
          <div id="thoughts">
            <span class="empty-state">Thought process will appear here after a query.</span>
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header">Conversation Memory</div>
        <div class="panel-body" id="memory-body">
          <div id="memory">
            <span class="empty-state">No conversation history yet.</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const askBtn     = document.getElementById('ask-btn');
    const deleteBtn  = document.getElementById('delete-btn');
    const questionEl = document.getElementById('question');
    const answerEl   = document.getElementById('answer-text');
    const thoughtsEl = document.getElementById('thoughts');
    const thoughtsBody = document.getElementById('thoughts-body');
    const memoryEl   = document.getElementById('memory');
    const memoryBody = document.getElementById('memory-body');
    const statusEl   = document.getElementById('status');
    const liveDot    = document.getElementById('live-dot');

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.style.color = isError ? '#fc8181' : 'var(--muted)';
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function scrollThoughts() {
      thoughtsBody.scrollTop = thoughtsBody.scrollHeight;
    }

    // ── Live thought-process builders ──────────────────────────────────────

    let currentThoughtEl = null;  // open "Thought" block receiving tokens

    function flushThought() {
      currentThoughtEl = null;
    }

    function appendToken(token) {
      if (!currentThoughtEl) {
        currentThoughtEl = document.createElement('div');
        currentThoughtEl.className = 'te thought';
        currentThoughtEl.innerHTML =
          '<div class="te-header"><span class="te-label">Thought</span></div>' +
          '<div class="te-content"></div>';
        thoughtsEl.appendChild(currentThoughtEl);
      }
      currentThoughtEl.querySelector('.te-content').textContent += token;
      scrollThoughts();
    }

    function appendAction(tool, input) {
      flushThought();
      const el = document.createElement('div');
      el.className = 'te action';
      el.innerHTML =
        `<div class="te-header">` +
          `<span class="te-label">Action</span>` +
          `<span class="te-tool">${esc(tool)}</span>` +
        `</div>` +
        `<div class="te-content">${esc(input)}</div>`;
      thoughtsEl.appendChild(el);
      scrollThoughts();
    }

    function appendObservation(data, isError) {
      const el = document.createElement('div');
      el.className = isError ? 'te obs-error' : 'te observation';
      el.innerHTML =
        `<div class="te-header"><span class="te-label">Observation</span></div>` +
        `<div class="te-content">${esc(data)}</div>`;
      thoughtsEl.appendChild(el);
      scrollThoughts();
    }

    // ── Memory renderer ────────────────────────────────────────────────────

    function renderMemory(messages) {
      if (!messages || !messages.length)
        return '<span class="empty-state">No conversation history yet.</span>';
      return messages.map(m =>
        `<div class="msg ${m.role}">` +
          `<div class="role">${m.role === 'human' ? 'You' : 'Assistant'}</div>` +
          `<div>${esc(m.content)}</div>` +
        `</div>`
      ).join('');
    }

    // ── SSE event handler ──────────────────────────────────────────────────

    function handleEvent(event) {
      switch (event.type) {
        case 'token':
          appendToken(event.data);
          break;
        case 'action':
          appendAction(event.tool, event.input);
          setStatus(`Calling ${event.tool}…`);
          break;
        case 'observation':
          appendObservation(event.data, !!event.is_error);
          setStatus('Waiting for agent…');
          break;
        case 'answer':
          flushThought();
          answerEl.textContent = event.data;
          answerEl.classList.remove('empty');
          if (event.memory) {
            memoryEl.innerHTML = renderMemory(event.memory);
            memoryBody.scrollTop = memoryBody.scrollHeight;
          }
          break;
        case 'error':
          setStatus(event.data, true);
          break;
      }
    }

    // ── Submit ─────────────────────────────────────────────────────────────

    async function submitQuestion() {
      const question = questionEl.value.trim();
      if (!question) return;

      askBtn.disabled = true;
      askBtn.innerHTML = '<span class="spinner"></span>Thinking…';
      answerEl.textContent = '';
      answerEl.classList.add('empty');
      thoughtsEl.innerHTML = '';
      liveDot.classList.add('active');
      setStatus('Connecting…');

      try {
        const response = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question }),
        });

        if (!response.ok) {
          const data = await response.json().catch(() => ({}));
          setStatus(data.error || `Server error ${response.status}`, true);
          return;
        }

        const reader  = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        setStatus('Streaming…');

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();   // keep incomplete last line

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const raw = line.slice(6).trim();
            if (raw === '[DONE]') { setStatus('Done.'); break; }
            try { handleEvent(JSON.parse(raw)); } catch (_) {}
          }
        }
      } catch (err) {
        setStatus('Request failed: ' + err.message, true);
      } finally {
        askBtn.disabled = false;
        askBtn.textContent = 'Ask';
        liveDot.classList.remove('active');
      }
    }

    // ── Provider selector ──────────────────────────────────────────────────

    const providerSelect = document.getElementById('provider-select');

    async function loadProvider() {
      try {
        const res  = await fetch('/provider');
        const data = await res.json();
        providerSelect.value = data.provider || 'openai';
      } catch (_) {}
    }

    providerSelect.addEventListener('change', async () => {
      const provider = providerSelect.value;
      setStatus(`Switching to ${provider === 'azure' ? 'Azure OpenAI' : 'OpenAI'}…`);
      try {
        const res  = await fetch('/provider', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ provider }),
        });
        const data = await res.json();
        if (data.success) {
          setStatus(`Provider set to ${provider === 'azure' ? 'Azure OpenAI' : 'OpenAI'}. Agent will reinitialize on next query.`);
        } else {
          setStatus(data.error || 'Failed to switch provider.', true);
          await loadProvider();  // revert selector to actual value
        }
      } catch (err) {
        setStatus('Failed: ' + err.message, true);
        await loadProvider();
      }
    });

    loadProvider();

    askBtn.addEventListener('click', submitQuestion);
    questionEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) submitQuestion();
    });

    // ── Delete embeddings ──────────────────────────────────────────────────

    deleteBtn.addEventListener('click', async () => {
      if (!confirm('Delete the FAISS embeddings? The PDF will be re-embedded on the next query.')) return;
      deleteBtn.disabled = true;
      setStatus('Deleting embeddings…');
      try {
        const res  = await fetch('/delete-embeddings', { method: 'POST' });
        const data = await res.json();
        setStatus(data.message, !data.success);
      } catch (err) {
        setStatus('Failed: ' + err.message, true);
      } finally {
        deleteBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
